<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Screen Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c0c0e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    color: white;
  }

  /* Blurred album art background — same as real app */
  .bg-art {
    position: fixed;
    inset: 0;
    background: url('https://i.scdn.co/image/ab67616d0000b273f907de96b9a4fbc04accc0d5') center/cover;
    filter: blur(72px) brightness(0.25) saturate(1.8);
    transform: scale(1.25);
  }

  .dark-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 24px;
    text-align: center;
  }

  /* ── Spinning circle album art ── */
  .art-outer {
    width: 288px;
    height: 288px;
    border-radius: 50%;
    animation: live-spin 8s linear infinite;
    animation-play-state: running;
  }

  .art-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }

  .art-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .vinyl-hole {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .vinyl-hole-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: black;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
  }

  @keyframes live-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── Track info — same as current app ── */
  .track-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .track-name {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
    color: white;
  }

  .track-artist {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
  }

  /* ── Demo toggle ── */
  .demo {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .demo button {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    cursor: pointer;
    transition: all 150ms;
  }

  .demo button.active {
    background: #1DB954;
    border-color: #1DB954;
    color: #000;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="bg-art"></div>
<div class="dark-overlay"></div>

<div class="content">

  <div class="art-outer" id="art">
    <div class="art-inner">
      <img src="https://i.scdn.co/image/ab67616d0000b273f907de96b9a4fbc04accc0d5" alt="">
    </div>
    <div class="vinyl-hole">
      <div class="vinyl-hole-dot"></div>
    </div>
  </div>

  <div class="track-info">
    <div class="track-name">Mr. Brightside</div>
    <div class="track-artist">The Killers</div>
  </div>

  <div class="demo">
    <button class="active" onclick="play(this)">▶ Playing</button>
    <button onclick="pause(this)">⏸ Paused</button>
  </div>

</div>

<script>
  const art = document.getElementById('art')
  function play(btn) {
    art.style.animationPlayState = 'running'
    document.querySelectorAll('.demo button').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
  }
  function pause(btn) {
    art.style.animationPlayState = 'paused'
    document.querySelectorAll('.demo button').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
  }
</script>
</body>
</html>
